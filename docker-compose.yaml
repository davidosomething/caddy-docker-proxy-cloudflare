---
# caddy-docker-proxy-cloudflare
# Secure compose file following OWASP Docker Security guidelines.
# Runs as non-root (USER caddy) with CAP_NET_BIND_SERVICE
# at the container level, so ports 80/443 work without a
# privileged container.

services:
  # ==========================================================================
  # Caddy reverse proxy with Docker discovery + Cloudflare DNS
  # ==========================================================================
  caddy:
    image: ghcr.io/davidosomething/caddy-docker-proxy-cloudflare:beta
    container_name: caddy
    restart: unless-stopped
    networks:
      - caddy

    # ------------------------------------------------------------------
    # Ports — Caddy binds 80/443 via cap_net_bind_service (non-root safe)
    # ------------------------------------------------------------------
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)

    # ------------------------------------------------------------------
    # Docker socket — read-only mount so the proxy can discover containers
    # Never mount the Docker socket read-write in production.
    # ------------------------------------------------------------------
    volumes:
      - caddy_data:/data/caddy   # TLS certificates, persisted across restarts
      - caddy_config:/config/caddy
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # ------------------------------------------------------------------
    # Cloudflare API token for DNS-01 ACME challenges
    # Create a token at: https://dash.cloudflare.com/profile/api-tokens
    # Required permissions: Zone:DNS:Edit
    # ------------------------------------------------------------------
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?required}

    # ------------------------------------------------------------------
    # OWASP: Drop all capabilities, add only what's needed.
    # CAP_NET_BIND_SERVICE lets Caddy bind to privileged ports (80, 443)
    # while running as a non-root user inside the container.
    # ------------------------------------------------------------------
    cap_drop:
      - ALL
    cap_add:
      - CAP_NET_BIND_SERVICE

    # ------------------------------------------------------------------
    # OWASP: Read-only root filesystem with tmpfs for writable paths.
    # Caddy only writes to /data/caddy (certificates) and /tmp (ocsp staples).
    # ------------------------------------------------------------------
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64M

    # ------------------------------------------------------------------
    # Resource limits — protect the host from runaway memory/CPU usage
    # ------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

    # ------------------------------------------------------------------
    # Health check — Caddy admin API on port 2019
    # ------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:2019/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ==========================================================================
  # Example: a backend service discovered automatically by Caddy
  # ==========================================================================
  whoami:
    image: docker.io/traefik/whoami:latest
    container_name: whoami
    restart: unless-stopped
    networks:
      - caddy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    cap_drop:
      - ALL
    # caddy-docker-proxy reads these labels to generate routes:
    labels:
      caddy: whoami.example.com                     # domain name
      caddy.reverse_proxy: "{{ upstreams 80 }}"     # proxy to container port 80
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  caddy:
    name: caddy
    driver: bridge

volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
